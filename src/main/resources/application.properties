spring.application.name=analytics-service

server.port = 8085

spring.rabbitmq.host=127.0.0.1
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

rabbitmq.queue.name=demo-queue
rabbitmq.exchange.name=demo-exchange
rabbitmq.routing.key=demo-routing-key

spring.rabbitmq.listener.simple.ack-mode=manual

spring.datasource.url=jdbc:mysql://localhost:3306/analytics_service_db
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
